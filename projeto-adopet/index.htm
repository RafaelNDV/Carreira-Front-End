<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopet</title>
    <link rel="stylesheet" href="assests/css/style.css">
</head>
<body>
    <h1>Encontre seu pet aqui</h1>

    <p>
        Dê uma olhada na nossa longa lista de pet, e tenho 
        certeza que você não vai se arrepender e vai sair daqui 
        com o seu novo bixinho de estimação.
    </p>

    <form id="pet-form">
        <input type="hidden" id="pet-id" />
        <input type="text" id="pet-nome" placeholder="Nome do Pet">
        <input type="text" id="pet-especie" placeholder="Espécie do Pet">
        <input type="text" id="pet-raca" placeholder="Raça do Pet">
        <button type="submit">Salvar</button>
    </form>

    <ul id="lista-pets"></ul>

    <script type="module" src="./js/api.js"></script>
    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/ui.js"></script>
</body>
</html>
